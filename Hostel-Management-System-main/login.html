<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hostel Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Login Page Styles */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--light-bg);
            padding: 2rem;
        }

        .login-card {
            background: white;
            border-radius: 1rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            font-size: 1rem;
            color: var(--text-primary);
            background-color: var(--light-bg);
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
        }

        .login-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .login-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .login-link:hover {
            color: var(--primary-hover);
        }

        .error-message {
            background-color: var(--danger-bg);
            color: var(--danger-color);
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .login-container {
                padding: 1rem;
            }

            .login-card {
                padding: 2rem;
            }

            .login-title {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Please login to continue</p>
                <div class="user-type-badge" id="userTypeBadge">Student</div>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="rollNumber">Roll Number</label>
                    <input type="text" id="rollNumber" name="rollNumber" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="login-button">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="login-footer">
                <p>Don't have an account? <a href="signup.html" id="signupLink">Sign up</a></p>
                <p>Not the right user type? <a href="user_selection.html">Change here</a></p>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Get selected user type from localStorage
            const userType = localStorage.getItem('userType') || 'student';
            document.getElementById('userTypeBadge').textContent = 
                userType.charAt(0).toUpperCase() + userType.slice(1);

            // Update signup link to include user type
            const signupLink = document.getElementById('signupLink');
            signupLink.href = `signup.html?userType=${userType}`;
        });

        async function handleLogin(event) {
            event.preventDefault();
            const loadingOverlay = document.getElementById('loadingOverlay');
            loadingOverlay.style.display = 'flex';

            try {
                const rollNumber = document.getElementById('rollNumber').value;
                const password = document.getElementById('password').value;
                const userType = localStorage.getItem('userType') || 'student';

                // Initialize users array if not exists
                let users = JSON.parse(localStorage.getItem('users')) || [];
                
                // Default admin credentials
                if (userType === 'admin' && rollNumber === 'ramu123' && password === 'ramu123') {
                    const adminUser = {
                        rollNumber: 'ramu123',
                        name: 'Admin',
                        userType: 'admin',
                        password: 'ramu123'
                    };
                    
                    // Add admin to users if not exists
                    if (!users.some(u => u.rollNumber === 'ramu123')) {
                        users.push(adminUser);
                        localStorage.setItem('users', JSON.stringify(users));
                    }
                    
                    localStorage.setItem('loggedInUser', JSON.stringify(adminUser));
                    window.location.href = 'admin_dashboard.html';
                    return;
                }

                // For students, check if user exists
                let user = users.find(u => u.rollNumber === rollNumber);

                // If user doesn't exist, check maintenance requests
                if (!user) {
                    const maintenanceRequests = JSON.parse(localStorage.getItem('maintenanceRequests')) || [];
                    const request = maintenanceRequests.find(r => r.studentId === rollNumber);
                    
                    if (request) {
                        user = {
                            rollNumber: request.studentId,
                            name: request.studentName,
                            userType: 'student',
                            password: request.studentId
                        };
                        users.push(user);
                        localStorage.setItem('users', JSON.stringify(users));
                    }
                }

                // If still no user, create new one if valid roll number format
                if (!user && rollNumber.match(/^122cs\d{4}$/i)) {
                    user = {
                        rollNumber: rollNumber,
                        name: 'Student',
                        userType: 'student',
                        password: rollNumber,
                        status: 'active'
                    };
                    users.push(user);
                    localStorage.setItem('users', JSON.stringify(users));
                }

                // Verify credentials
                if (!user || (password !== user.password && password !== user.rollNumber)) {
                    showError('Invalid roll number or password');
                    return;
                }

                // Store logged in user info
                const loggedInUser = {
                    rollNumber: user.rollNumber,
                    name: user.name || 'Student',
                    userType: userType,
                    room: user.room || '',
                    status: user.status || 'active'
                };
                
                localStorage.setItem('loggedInUser', JSON.stringify(loggedInUser));

                // Redirect based on user type
                if (userType === 'admin') {
                    window.location.href = 'admin_dashboard.html';
                } else {
                    window.location.href = 'student_dashboard.html';
                }

            } catch (error) {
                console.error('Login error:', error);
                showError('An error occurred during login. Please try again.');
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }

        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
